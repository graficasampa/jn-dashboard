<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="64x64" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JN Gráfica · Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="hdr">
        <div class="hdr-top">
          <div class="hdr-brand">
            <img src="/logoJN.png" alt="JN Gráfica" style="height:22px;object-fit:contain;display:block;flex-shrink:0">
            <div class="hdr-sep"></div>
            <button class="back-btn" id="backBtn" style="display:none" onclick="window.goToHub()">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Visão Geral
            </button>
            <span class="hdr-pill" id="monthLabel">Visão Geral</span>
          </div>
          <div class="hdr-right">
            <div class="upd-badge" id="updBadge">
              <span class="upd-dot"></span>
              <span class="upd-txt" id="updText">Atualizado</span>
            </div>
            <button class="btn-pdf" id="btnDownload" onclick="window.print()">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 10v3h10v-3M8 2v8M5 7l3 3 3-3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Baixar PDF
            </button>
          </div>
        </div>
        <!-- Platform Selector -->
        <div class="platform-bar">
          <div class="platform-bar-inner" id="platformBar">
            <!-- injected by JS -->
          </div>
        </div>
        <!-- Sub-nav injected by JS -->
        <div id="subNavContainer"></div>
      </header>

      <!-- Main content -->
      <main class="main" id="mainContent">
        <div style="text-align:center;padding:60px 0;color:var(--t3)">Carregando...</div>
      </main>

      <!-- Footer -->
      <div class="ftr">
        <span>JN Gráfica · Dashboard de Marketing</span>
        <span id="ftrPeriod"></span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
